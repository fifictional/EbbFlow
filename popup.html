<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c0f;
      --surface: #13131a;
      --surface2: #1a1a24;
      --border: rgba(255,255,255,0.06);
      --accent: #7c6af7;
      --accent2: #4fd1c5;
      --accent3: #f7a26a;
      --text: #e8e8f0;
      --muted: #5a5a72;
      --danger: #f76a6a;
      --success: #6af79e;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      min-height: 480px;
      background: var(--bg);
      font-family: 'DM Mono', monospace;
      color: var(--text);
      overflow: hidden;
      position: relative;
    }

    /* Ambient glow background */
    body::before {
      content: '';
      position: fixed;
      top: -80px;
      left: -40px;
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -60px;
      right: -40px;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(79,209,197,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Header */
    .header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .logo-mark {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      box-shadow: 0 0 16px rgba(124,106,247,0.35);
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .logo-text span {
      color: var(--accent);
    }

    .live-dot {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dot {
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 0 6px var(--success);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Stats area */
    #stats {
      padding: 14px 20px;
      min-height: 320px;
    }

    /* Default loading state */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 280px;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Metric cards */
    .metric-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 13px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 2px;
      background: var(--accent-color, var(--accent));
      opacity: 0.6;
    }

    .metric-card:hover {
      border-color: rgba(255,255,255,0.12);
    }

    .metric-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .metric-value {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .metric-value.accent { color: var(--accent); }
    .metric-value.accent2 { color: var(--accent2); }
    .metric-value.accent3 { color: var(--accent3); }
    .metric-value.danger { color: var(--danger); }

    .metric-sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Wide card */
    .metric-card.wide {
      grid-column: 1 / -1;
    }

    /* Rhythm bar */
    .rhythm-bar-wrap {
      margin-top: 8px;
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }

    .rhythm-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Status message */
    .status-msg {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      text-align: center;
    }

    .status-msg .icon {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .status-msg h3 {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }

    .status-msg p {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    .status-msg ol {
      text-align: left;
      font-size: 11px;
      color: var(--muted);
      padding-left: 18px;
      margin-top: 8px;
      line-height: 1.7;
    }

    /* Footer buttons */
    .footer {
      padding: 12px 20px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    #exportBtn {
      background: rgba(106,247,158,0.08);
      color: var(--success);
      border-color: rgba(106,247,158,0.2);
    }

    #exportBtn:hover {
      background: rgba(106,247,158,0.15);
      border-color: rgba(106,247,158,0.4);
      box-shadow: 0 0 12px rgba(106,247,158,0.1);
    }

    #resetBtn {
      background: rgba(247,106,106,0.08);
      color: var(--danger);
      border-color: rgba(247,106,106,0.2);
    }

    #resetBtn:hover {
      background: rgba(247,106,106,0.15);
      border-color: rgba(247,106,106,0.4);
      box-shadow: 0 0 12px rgba(247,106,106,0.1);
    }

    .btn:active {
      transform: scale(0.97);
    }

    /* Fade in animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .metric-card {
      animation: fadeUp 0.3s ease both;
    }

    .metric-card:nth-child(1) { animation-delay: 0.05s; }
    .metric-card:nth-child(2) { animation-delay: 0.1s; }
    .metric-card:nth-child(3) { animation-delay: 0.15s; }
    .metric-card:nth-child(4) { animation-delay: 0.2s; }
    .metric-card:nth-child(5) { animation-delay: 0.25s; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">
      <div class="logo-mark">⟆</div>
      <div class="logo-text">Ebb<span>Flow</span></div>
    </div>
    <div class="live-dot">
      <div class="dot"></div>
      live
    </div>
  </div>

  <div id="stats">
    <div class="loading-state">
      <div class="spinner"></div>
      <span>connecting...</span>
    </div>
  </div>

  <div class="footer">
    <button class="btn" id="exportBtn">↓ Export</button>
    <button class="btn" id="resetBtn">↺ Reset</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
